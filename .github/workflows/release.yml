name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - run: go test ./...

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y debhelper devscripts

      - name: Create orig tarball
        run: |
          VERSION=$(head -1 debian/changelog | grep -oP '\(\K[^)]+' | sed 's/-.*//')
          tar czf ../pve-snapshot-api_${VERSION}.orig.tar.gz --exclude=.git --exclude=debian --transform "s,^\.,pve-snapshot-api-${VERSION}," .

      - name: Build binary and source packages
        run: dpkg-buildpackage -us -uc -d

      - name: Install Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Upload to Cloudsmith (stable)
        run: |
          cloudsmith push deb freshost/pve-snapshot-api/debian/bookworm ../pve-snapshot-api_*.deb
          cloudsmith push deb freshost/pve-snapshot-api/debian/trixie ../pve-snapshot-api_*.deb
          cloudsmith push deb freshost/pve-snapshot-api/debian/bookworm ../pve-snapshot-api_*.dsc --sources-path ../
          cloudsmith push deb freshost/pve-snapshot-api/debian/trixie ../pve-snapshot-api_*.dsc --sources-path ../
