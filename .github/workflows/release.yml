name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - run: go test ./...

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y debhelper devscripts

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b -d

      - name: Install Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Upload to Cloudsmith (stable)
        run: |
          cloudsmith push deb freshost/pve-snapshot-api/debian/bookworm ../pve-snapshot-api_*.deb --component stable
          cloudsmith push deb freshost/pve-snapshot-api/debian/trixie ../pve-snapshot-api_*.deb --component stable
